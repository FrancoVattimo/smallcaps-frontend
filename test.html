<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Supabase Connection</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: monospace; padding: 20px; background: #080e1a; color: #e2e8f0; }
    .ok { color: #00ff88; }
    .err { color: #ef4444; }
    pre { background: #111d33; padding: 10px; border-radius: 6px; overflow: auto; }
  </style>
</head>
<body>
  <h2>Test de conexion a Supabase</h2>
  <div id="status">Conectando...</div>
  <h3>Query: stocks con nombre NOT NULL (limit 5)</h3>
  <pre id="result">Cargando...</pre>

  <script>
    const SUPABASE_URL = 'https://difumwahbazkoglmtnon.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ZXMHYB4buYuBFLaboNmECA_zA34o6pI';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function test() {
      try {
        // Test basico
        const { data, count, error } = await supabase
          .from('stocks')
          .select('*', { count: 'exact' })
          .not.is('nombre', null)
          .limit(5);

        if (error) throw error;

        document.getElementById('status').innerHTML = 
          '<span class="ok">✓ Conexion OK</span> | Count total: ' + (count || 'N/A') + ' | Data devuelta: ' + data.length;
        
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('status').innerHTML = '<span class="err">✗ Error: ' + e.message + '</span>';
        document.getElementById('result').textContent = e.stack || e.message;
      }
    }

    test();
  </script>
</body>
</html>
