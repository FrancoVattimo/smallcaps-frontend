<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Supabase Connection</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #080e1a; color: #e2e8f0; line-height: 1.6; }
    .ok { color: #00ff88; }
    .err { color: #ef4444; }
    pre { background: #111d33; padding: 10px; border-radius: 6px; overflow: auto; font-size: 12px; }
    #log { max-height: 300px; overflow-y: auto; }
    .log-line { margin: 2px 0; padding: 2px 0; border-bottom: 1px solid #1e2d47; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2>Test de conexion a Supabase</h2>
  <div id="log"></div>
  <pre id="result">Esperando...</pre>

  <script>
    function log(msg, type) {
      const div = document.getElementById('log');
      const line = document.createElement('div');
      line.className = 'log-line ' + (type || '');
      line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      div.appendChild(line);
    }

    log('Script iniciado');
    log('window.supabase existe? ' + (typeof window.supabase !== 'undefined'));

    if (typeof window.supabase === 'undefined') {
      log('ERROR: La libreria de Supabase no cargo.', 'err');
      document.getElementById('result').textContent = 'FAIL: window.supabase is undefined. Verificar ad-blockers o conexion a internet.';
    } else {
      log('Supabase library OK', 'ok');
      try {
        const client = window.supabase.createClient(
          'https://difumwahbazkoglmtnon.supabase.co',
          'sb_publishable_ZXMHYB4buYuBFLaboNmECA_zA34o6pI'
        );
        log('Cliente creado OK');
        log('Ejecutando query...');
        client.from('stocks').select('*').limit(3).then(({data, error}) => {
          if (error) {
            log('Query ERROR: ' + error.message, 'err');
            document.getElementById('result').textContent = JSON.stringify(error, null, 2);
          } else {
            log('Query OK, filas: ' + (data ? data.length : 0), 'ok');
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
          }
        });
      } catch (e) {
        log('EXCEPTION: ' + e.message, 'err');
      }
    }
  </script>
</body>
</html>
