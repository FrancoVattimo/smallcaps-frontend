<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Screener Query</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #080e1a; color: #e2e8f0; }
    .ok { color: #00ff88; }
    .err { color: #ef4444; }
    pre { background: #111d33; padding: 10px; border-radius: 6px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Test: Query exacta del screener</h2>
  <div id="status">Cargando...</div>
  <h3>Resultado:</h3>
  <pre id="result">...</pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    async function test() {
      try {
        const client = window.supabase.createClient(
          'https://difumwahbazkoglmtnon.supabase.co',
          'sb_publishable_ZXMHYB4buYuBFLaboNmECA_zA34o6pI'
        );

        // Query EXACTA del screener
        const { data, count, error } = await client
          .from('stocks')
          .select('*', { count: 'exact' })
          .not('nombre', 'is', null)
          .order('market_cap', { ascending: false, nullsFirst: false })
          .range(0, 49);

        if (error) {
          document.getElementById('status').innerHTML = '<span class="err">Error: ' + error.message + '</span>';
          document.getElementById('result').textContent = JSON.stringify(error, null, 2);
          return;
        }

        document.getElementById('status').innerHTML = 
          '<span class="ok">OK</span> - Count: ' + (count || 'N/A') + ' | Data: ' + (data ? data.length : 0) + ' filas';
        
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('status').innerHTML = '<span class="err">Exception: ' + e.message + '</span>';
      }
    }

    test();
  </script>
</body>
</html>
