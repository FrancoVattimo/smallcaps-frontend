<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Screener Test</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #080e1a; color: #e2e8f0; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #333; }
    th { color: #888; font-size: 12px; text-transform: uppercase; }
    .ticker { color: #00ff88; font-weight: bold; }
    .num { text-align: right; }
    .loading { color: #666; padding: 40px; text-align: center; }
    .error { color: #ef4444; padding: 40px; text-align: center; }
  </style>
</head>
<body>
  <h2>Simple Screener Test</h2>
  <div id="status" class="loading">Cargando desde Supabase...</div>
  <table id="table" style="display:none">
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Nombre</th>
        <th class="num">Precio</th>
        <th class="num">Market Cap</th>
        <th>Sector</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    async function load() {
      try {
        const client = window.supabase.createClient(
          'https://difumwahbazkoglmtnon.supabase.co',
          'sb_publishable_ZXMHYB4buYuBFLaboNmECA_zA34o6pI'
        );

        const { data, error } = await client
          .from('stocks')
          .select('ticker, nombre, precio, market_cap, sector')
          .not('nombre', 'is', null)
          .order('market_cap', { ascending: false })
          .limit(50);

        if (error) throw error;

        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';

        if (!data || data.length === 0) {
          document.getElementById('status').className = 'error';
          document.getElementById('status').textContent = 'No se encontraron empresas con datos';
          return;
        }

        data.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="ticker">${row.ticker}</td>
            <td>${row.nombre || '-'}</td>
            <td class="num">${row.precio ? '$' + row.precio.toFixed(2) : '-'}</td>
            <td class="num">${row.market_cap ? '$' + (row.market_cap / 1e6).toFixed(1) + 'M' : '-'}</td>
            <td>${row.sector || '-'}</td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById('status').style.display = 'none';
        document.getElementById('table').style.display = 'table';
      } catch (e) {
        document.getElementById('status').className = 'error';
        document.getElementById('status').textContent = 'Error: ' + e.message;
        console.error(e);
      }
    }

    load();
  </script>
</body>
</html>
